battery:
    cap:        4.56                # Nominal capacity                   [A*h]
    temp:       303.15              # Temperature                          [K]
    area:       0.103675            # Cell area                           [m2]

electrolyte:
    Li_0:       1.0                 # Initial Li+ conc.              [kmol/m3]
    material:   Gen2Electrolyte     # Electrolyte material class           [-]
    D_deg:      1.0                 # Degradation factor for D             [-]
    t0_deg:     1.0                 # Degradation factor for t0            [-]
    kappa_deg:  1.0                 # Degradation factor for kappa         [-]
    gamma_deg:  1.0                 # Degradation factor for gamma         [-]

anode:
    Nx:         32                  # Number of x discretizations          [-]
    Nr:         30                  # Number of r discretizations          [-]
    thick:      87.0e-6             # Thickness                            [m]
    R_s:        5.86e-6             # Secondary particle radius            [m]
    eps_s:      0.75                # Solid-phase volume frac.             [-]
    eps_el:     0.25                # Electrolyte volume frac.             [-]
    eps_CBD:    0.0                 # Carbon-binder-domain volume frac.    [-]
    p_sol:      2.91                # Solids Bruggeman factor (eps**p)     [-]
    p_liq:      2.91                # Liquids Bruggeman factor (eps**p)    [-]
    alpha_a:    0.5                 # Anodic charge transfer coeff.        [-]
    alpha_c:    0.5                 # Cathodic charge transfer coeff.      [-]
    Li_max:     29.583              # Maximum solid-phase Li conc.   [kmol/m3]
    x_0:        0.07                # Initial intercalation frac.          [-]
    i0_deg:     1.0                 # Degradation factor for i0            [-]
    Ds_deg:     1.0                 # Degradation factor for Ds            [-]
    material:   GraphiteSiOxSlow    # Anode active material class          [-]

separator:
    Nx:         32                  # Number of x discretizations          [-]
    thick:      12.e-6              # Thickness                            [m]
    eps_el:     0.47                # Electrolyte volume frac.             [-]
    p_liq:      2.57                # Liquids Bruggeman factor (eps**p)    [-]

cathode:
    Nx:         32                  # Number of x discretizations          [-]
    Nr:         30                  # Number of r discretizations          [-]
    thick:      69.0e-6             # Thickness                            [m]
    R_s:        5.22e-6             # Secondary particle radius            [m]
    eps_s:      0.665               # Solid-phase volume frac.             [-]
    eps_el:     0.335               # Electrolyte volume frac.             [-]
    eps_CBD:    0.0                 # Carbon-binder-domain volume frac.    [-]
    p_sol:      2.43                # Solids Bruggeman factor (eps**p)     [-]
    p_liq:      2.43                # Liquids Bruggeman factor (eps**p)    [-]
    alpha_a:    0.5                 # Anodic charge transfer coeff.        [-]
    alpha_c:    0.5                 # Cathodic charge transfer coeff.      [-]
    Li_max:     51.765              # Maximum solid-phase Li conc.   [kmol/m3]
    x_0:        0.89                # Initial intercalation frac.          [-]
    i0_deg:     1.0                 # Degradation factor for i0            [-]
    Ds_deg:     1.0                 # Degradation factor for Ds            [-]
    material:   NMC811Slow          # Cathode active material class        [-]
